## Apply manifests to EKS after infra apply (repository_dispatch) or manually.
## Prod stack in infra is self-managed K8s — do not use this workflow for prod unless you align cluster naming.
name: Deploy to EKS

on:
  repository_dispatch:
    types: [eks-infra-applied]
  workflow_dispatch:
    inputs:
      environment:
        description: "unified = single cluster k8s-emad-…-eks; dev/staging = legacy per-env clusters"
        type: choice
        required: true
        options:
          - unified
          - dev
          - staging
          - prod
      kustomize_overlay:
        description: "Which Kustomize overlay to apply (dev = CI bumps; prod = after promote)"
        type: choice
        required: true
        default: dev
        options:
          - dev
          - prod
      aws_region:
        description: "AWS region"
        type: string
        default: "us-east-1"
      project_prefix:
        description: "Same as TF project var (default if empty)"
        type: string
        default: "k8s-emad-128768042813"

permissions:
  contents: read
  id-token: write

jobs:
  kubectl-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve inputs
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
            REGION="${{ inputs.aws_region }}"
            PREFIX="${{ inputs.project_prefix }}"
            OVERLAY="${{ inputs.kustomize_overlay }}"
          else
            ENV="${{ github.event.client_payload.environment }}"
            REGION="${{ github.event.client_payload.region }}"
            PREFIX="${{ github.event.client_payload.project_prefix }}"
            OVERLAY="${{ github.event.client_payload.kustomize_overlay }}"
          fi
          OVERLAY="${OVERLAY:-dev}"
          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"
          echo "region=${REGION}" >> "$GITHUB_OUTPUT"
          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "kustomize_overlay=${OVERLAY}" >> "$GITHUB_OUTPUT"
          if [ "$ENV" = "unified" ]; then
            echo "cluster_name=${PREFIX}-eks" >> "$GITHUB_OUTPUT"
          else
            echo "cluster_name=${PREFIX}-${ENV}-eks" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout manifests
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_EKS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ steps.meta.outputs.region }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: kubeconfig + apply
        env:
          CLUSTER: ${{ steps.meta.outputs.cluster_name }}
          REGION: ${{ steps.meta.outputs.region }}
        run: |
          aws eks update-kubeconfig --name "$CLUSTER" --region "$REGION"
          kubectl version --client
          kubectl apply -k "overlays/${{ steps.meta.outputs.kustomize_overlay }}"
