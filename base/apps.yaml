apiVersion: apps/v1
kind: Deployment
metadata:
  name: apps
  namespace: vprofile
  labels:
    app.kubernetes.io/name: apps
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: vprofile
    app: apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apps
  template:
    metadata:
      labels:
        app: apps
        app.kubernetes.io/name: apps
        app.kubernetes.io/component: application
        app.kubernetes.io/part-of: vprofile
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: apps
          image: k8s-emad-128768042813-dev-apps
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          env:
            - name: DB_HOST
              value: mysql
            - name: MEMCACHED_HOST
              value: memcached
            - name: RABBITMQ_HOST
              value: rabbitmq
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: tomcat-temp
              mountPath: /usr/local/tomcat/temp
            - name: tomcat-work
              mountPath: /usr/local/tomcat/work
            - name: tomcat-logs
              mountPath: /usr/local/tomcat/logs
      volumes:
        - name: tmp
          emptyDir: {}
        - name: tomcat-temp
          emptyDir: {}
        - name: tomcat-work
          emptyDir: {}
        - name: tomcat-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: apps
  namespace: vprofile
  labels:
    app.kubernetes.io/name: apps
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: vprofile
    vprofile.io/metrics: enabled
    app: apps
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: /metrics
spec:
  selector:
    app: apps
  ports:
    - name: http
      port: 8080
      targetPort: 8080

