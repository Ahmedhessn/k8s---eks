## EKS: use EBS CSI (Terraform module installs aws-ebs-csi-driver addon).
## WaitForFirstConsumer schedules the pod before binding so the volume is created in the pod's AZ.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Delete
