apiVersion: apps/v1
kind: Deployment
metadata:
  name: memcached
  namespace: vprofile
  labels:
    app.kubernetes.io/name: memcached
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: vprofile
    app: memcached
spec:
  replicas: 2
  selector:
    matchLabels:
      app: memcached
  template:
    metadata:
      labels:
        app: memcached
        app.kubernetes.io/name: memcached
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: vprofile
      annotations:
        prometheus.io/scrape: "false"
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: memcached
          image: k8s-emad-128768042813-dev-memcached
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          ports:
            - containerPort: 11211
          args: ["-m", "256", "-I", "2m"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            tcpSocket:
              port: 11211
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: memcached
  namespace: vprofile
  labels:
    app.kubernetes.io/name: memcached
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: vprofile
    vprofile.io/metrics: exporter-required
    app: memcached
  annotations:
    prometheus.io/scrape: "false"
spec:
  selector:
    app: memcached
  ports:
    - name: memcached
      port: 11211
      targetPort: 11211

